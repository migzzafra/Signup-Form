<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
</head>
    <link rel="stylesheet" href="styles.css">
<body>
<!-- IMAGE BANNER SECTION
This section places the image banner at the left side of the page-->
    <div class="bannersection">
        <p class="credit">Photo by <a href="https://unsplash.com/@karljkhedin?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Karl Hedin</a> on <a href="https://unsplash.com/photos/two-brown-and-black-wooden-houses-near-body-of-water-XRQrhupv1Ug?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </div>

<!-- FORM SECTION
 This section places the input elements on the right side of the page-->

    <!-- HEADER / INTRODUCTORY -->
    <div class="forms-container"> 
        <header class="headcontent">
            <p>This is not a real service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
            <p>You <em>know</em> you want to.</p>
        </header>
    
    <!-- INPUT FORM SECTION -->
        <section class="fillupform">
            <div class="dothis">
                <p class="introfill">Let's do this!</p>
            </div>
    
    <!-- FIRST COLUMN INPUTS -->
            <div class="inputform">
                <form action="#" class="leftinput formcontent">
                    <label for="first-name">FIRST NAME</label>
                    <input type="text" name="first-name" id="first-name" placeholder="ODIN">

                    <label for="user-email">EMAIL ADDRESS</label>
                    <input type="email" name="user-email" id="user-email" placeholder="odinthor@gmail.com">

                    <label for="password">PASSWORD</label>
                    <input type="password" name="password" id="password">
                </form>
    
    <!-- SECOND COLUMN INPUTS -->
                <form action="#" class="rightinput formcontent">
                    <label for="last-name">LAST NAME</label>
                    <input type="text" name="last-name" id="last-name" placeholder="THOR">
                    
                    <label for="phone-number">PHONE NUMBER</label>
                    <input type="text" name="phone-number" id="phone-number" maxlength="11" size="11" placeholder="09101082463">

                    <label for="passwordconfirmation">CONFIRM PASSWORD</label>
                    <input type="password" name="passwordconfirmation" id="passwordconfirmation">
                </form>
            </div>
        </section>
        
    <!-- CREATE ACCOUNT BUTTON -->
        <section class="submitsection">
            <a href="#"><button class="confirmcreation">Create Account</button></a>
            <p>Already have an account? <a href="#" class="login">Log in</a></p>
        </section>
        
    </div>
</body>
</html>
